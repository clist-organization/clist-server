spring:
  application:
    name: clist-server

  datasource:
    url: jdbc:h2:mem:clistdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

jwt:
  issuer: clist
  secret-key: ${JWT_SECRET_KEY:Y2xpc3Qtc2VjcmV0LWtleS1mb3ItaHMtMjU2LWFsZ29yaXRobS1sb25nLWVub3VnaA==}
  access-expiration-minutes: 60
  refresh-expiration-days: 7

openai:
  api-key: ${OPENAI_API_KEY:}
  model: gpt-4o-mini

server:
  port: 8080